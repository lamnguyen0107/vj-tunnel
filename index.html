<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tunnel VJ - Trình diễn âm thanh cực chill</title>
  <meta name="description"
    content="Welcome! Hãy chơi bản nhạc bạn thích và tận hưởng hành trình Tunnel VJ đầy màu sắc." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <canvas id="glcanvas"></canvas>

  <div id="ui-panel" class="ui-panel">
    <div class="ui-panel-header">
      <div class="window-dots" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <h1 class="ui-title">TUNNEL <span class="accent">VJ</span></h1>
      <div class="header-actions">
        <button id="lang-toggle" class="lang-btn" title="Chuyển ngôn ngữ">VI</button>
        <button id="toggle-panel" class="toggle-btn" title="Thu gọn/Mở rộng bảng điều khiển">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <div class="ui-panel-body">
      <!-- AUDIO + OBJECT -->
      <div class="ui-section">
        <div id="label-audio" class="section-label">ÂM THANH & OBJECT</div>
        <div class="audio-controls">
          <label for="audio-upload" class="upload-btn" id="upload-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span id="upload-text">Thêm nhạc</span>
          </label>
          <input type="file" id="audio-upload" accept=".mp3,.wav,.ogg,.flac,.aac" hidden />
          <button id="play-pause-btn" class="play-btn" disabled>
            <svg id="play-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg id="pause-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          </button>
        </div>
        <div class="slider-group" style="margin-top:8px;">
          <label id="label-volume" for="volume-slider">Âm lượng</label>
          <input type="range" id="volume-slider" min="0" max="100" value="100" />
          <span class="slider-value" id="volume-value">100</span>
        </div>
        <div class="audio-controls" style="margin-top:8px;">
          <label for="model-upload" class="upload-btn" id="model-upload-label">
            <span id="model-upload-text">Thêm 3D (.glb)</span>
          </label>
          <input type="file" id="model-upload" accept=".glb,.gltf" hidden />
          <label class="object-toggle-wrap" title="Bật/Tắt object">
            <input id="object-toggle" type="checkbox" checked />
          </label>
        </div>
        <div class="slider-group" style="margin-top:8px;">
          <label id="label-clone-count" for="clone-count-slider">Số object</label>
          <input type="range" id="clone-count-slider" min="1" max="20" value="5" />
          <span class="slider-value" id="clone-count-value">5</span>
        </div>
        <div class="slider-group">
          <label id="label-object-size" for="object-size-slider">Kích cỡ</label>
          <input type="range" id="object-size-slider" min="20" max="100" value="30" />
          <span class="slider-value" id="object-size-value">30</span>
        </div>
        <div class="slider-group">
          <label id="label-object-gap" for="object-gap-slider">Khoảng cách</label>
          <input type="range" id="object-gap-slider" min="2" max="100" value="28" />
          <span class="slider-value" id="object-gap-value">28</span>
        </div>
        <div class="toggle-row">
          <label id="label-clone-freefly" for="clone-freefly-toggle">Object bay tự do</label>
          <input id="clone-freefly-toggle" type="checkbox" />
        </div>
        <div class="rotation-section">
          <div class="slider-group">
            <label id="label-object-rot-x" for="object-rot-x-slider">Góc X</label>
            <input type="range" id="object-rot-x-slider" min="-180" max="180" value="0" />
            <span class="slider-value" id="object-rot-x-value">0</span>
          </div>
          <div class="slider-group">
            <label id="label-object-rot-y" for="object-rot-y-slider">Góc Y</label>
            <input type="range" id="object-rot-y-slider" min="-180" max="180" value="0" />
            <span class="slider-value" id="object-rot-y-value">0</span>
          </div>
          <div class="slider-group">
            <label id="label-object-rot-z" for="object-rot-z-slider">Góc Z</label>
            <input type="range" id="object-rot-z-slider" min="-180" max="180" value="0" />
            <span class="slider-value" id="object-rot-z-value">0</span>
          </div>
        </div>
      </div>

      <!-- TUNNEL CONTROLS -->
      <div class="ui-section">
        <div id="label-controls" class="section-label">ĐIỀU CHỈNH TUNNEL</div>
        <div class="slider-group">
          <label id="label-speed" for="speed-slider">Tốc độ</label>
          <input type="range" id="speed-slider" min="0" max="100" value="50" />
          <span class="slider-value" id="speed-value">50</span>
        </div>
        <div class="slider-group">
          <label id="label-sensitivity" for="sensitivity-slider">Độ nhạy</label>
          <input type="range" id="sensitivity-slider" min="0" max="100" value="50" />
          <span class="slider-value" id="sensitivity-value">50</span>
        </div>
        <div class="slider-group">
          <label id="label-kaleidoscope" for="kaleidoscope-slider">Kaleidoscope</label>
          <input type="range" id="kaleidoscope-slider" min="10" max="80" value="50" />
          <span class="slider-value" id="kaleidoscope-value">50</span>
        </div>
        <div class="toggle-row kaleido-auto-row">
          <label id="label-kaleidoscope-auto" for="kaleidoscope-auto-toggle">AUTO MIX</label>
          <input id="kaleidoscope-auto-toggle" type="checkbox" checked />
        </div>
        <div id="kaleido-grid" class="k-grid">
          <button class="k-item active" data-mode="0" title="Radial"><i class="fas fa-asterisk"></i></button>
          <button class="k-item" data-mode="1" title="Mirror"><i class="fas fa-th-large"></i></button>
          <button class="k-item" data-mode="2" title="Triangle"><i class="fas fa-play" style="transform: rotate(270deg);"></i></button>
          <button class="k-item" data-mode="3" title="Spiral"><i class="fas fa-hurricane"></i></button>
          <button class="k-item" data-mode="4" title="Diamond"><i class="fas fa-gem"></i></button>
          <button class="k-item" data-mode="5" title="HexGrid"><i class="fas fa-draw-polygon"></i></button>
          <button class="k-item" data-mode="6" title="Zoom"><i class="fas fa-search-plus"></i></button>
          <button class="k-item" data-mode="7" title="Fractal"><i class="fas fa-snowflake"></i></button>
          <button class="k-item" data-mode="8" title="Polka"><i class="fas fa-circle"></i></button>
          <button class="k-item" data-mode="9" title="Ribbon"><i class="fas fa-wave-square"></i></button>
        </div>
        <div class="slider-group">
          <label id="label-wave" for="wave-slider">Lượn sóng</label>
          <input type="range" id="wave-slider" min="0" max="100" value="50" />
          <span class="slider-value" id="wave-value">50</span>
        </div>
        <div class="slider-group">
          <label id="label-twist" for="twist-slider">Xoắn</label>
          <input type="range" id="twist-slider" min="0" max="100" value="50" />
          <span class="slider-value" id="twist-value">50</span>
        </div>
        <div class="slider-group">
          <label id="label-chaos" for="chaos-slider">Hỗn loạn</label>
          <input type="range" id="chaos-slider" min="0" max="100" value="50" />
          <span class="slider-value" id="chaos-value">50</span>
        </div>
      </div>

      <!-- THEME + COLOR -->
      <div class="ui-section">
        <div id="label-theme" class="section-label">CHỦ ĐỀ</div>
        <select id="theme-selector" class="control-select">
          <option value="neonCyberpunk" id="theme-neonCyberpunk">Neon Cyberpunk</option>
          <option value="psychedelicRainbow" id="theme-psychedelicRainbow">Cầu vồng Psychedelic</option>
          <option value="lavaCore" id="theme-lavaCore">Lava Core</option>
          <option value="deepOcean" id="theme-deepOcean">Deep Ocean</option>
          <option value="goldenEmerald" id="theme-goldenEmerald">Golden Emerald</option>
          <option value="acidTechno" id="theme-acidTechno">Acid Techno</option>
          <option value="sunsetHorizon" id="theme-sunsetHorizon">Sunset Horizon</option>
          <option value="vintageVapor" id="theme-vintageVapor">Vintage Vapor</option>
        </select>
        <div class="toggle-row" style="margin-bottom: 12px;">
          <label id="label-auto-color" for="auto-color-toggle" style="color: var(--accent); font-weight: 700;">AUTO MIX COLOR</label>
          <input id="auto-color-toggle" type="checkbox" checked />
        </div>
        <div class="color-row-inline">
          <div class="color-row">
            <label id="label-primary-color" for="primary-color">Color 1</label>
            <input type="color" id="primary-color" value="#39ff14" />
          </div>
          <div class="color-row">
            <label id="label-secondary-color" for="secondary-color">Color 2</label>
            <input type="color" id="secondary-color" value="#ff00ff" />
          </div>
          <div class="color-row">
            <label id="label-bg-color" for="bg-color">Background</label>
            <input type="color" id="bg-color" value="#000510" />
          </div>
        </div>
        <button id="randomize-btn" class="randomize-btn" style="margin-top:8px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 3 21 3 21 8"></polyline>
            <line x1="4" y1="20" x2="21" y2="3"></line>
            <polyline points="21 16 21 21 16 21"></polyline>
            <line x1="15" y1="15" x2="21" y2="21"></line>
            <line x1="4" y1="4" x2="9" y2="9"></line>
          </svg>
          <span id="randomize-text">Trộn ngẫu nhiên</span>
        </button>
      </div>

      <div class="ui-section fps-section">
        <span id="fps-counter" class="fps-counter">60 FPS</span>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="js/main.js"></script>
</body>

</html>
