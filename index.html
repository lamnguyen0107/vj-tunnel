<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tunnel VJ - Trình diễn âm thanh cực chill</title>
  <meta name="description" content="Welcome! Hãy chơi bản nhạc bạn thích và tận hưởng hành trình Tunnel VJ đầy màu sắc." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="glcanvas"></canvas>

  <div id="ui-panel" class="ui-panel">
    <div class="ui-panel-header">
      <h1 class="ui-title">TUNNEL <span class="accent">VJ</span></h1>
      <div class="header-actions">
        <button id="lang-toggle" class="lang-btn" title="Chuyển ngôn ngữ">VI</button>
        <button id="toggle-panel" class="toggle-btn" title="Thu gọn/Mở rộng bảng điều khiển">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </div>
    </div>

    <div class="ui-panel-body">
      <div class="ui-section welcome-section">
        <p id="welcome-copy" class="welcome-copy">
          Welcome! Hãy cho bản nhạc bạn thích vào đây và cùng tận hưởng một chuyến đi ánh sáng thật đã mắt, thật đã tai nhé.
        </p>
      </div>

      <div class="ui-section">
        <div id="label-audio" class="section-label">ÂM THANH</div>
        <div class="audio-controls">
          <label for="audio-upload" class="upload-btn" id="upload-label">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <span id="upload-text">Thêm nhạc</span>
          </label>
          <input type="file" id="audio-upload" accept=".mp3,.wav,.ogg,.flac,.aac" hidden />
          <button id="play-pause-btn" class="play-btn" disabled>
            <svg id="play-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
            <svg id="pause-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" style="display:none">
              <rect x="6" y="4" width="4" height="16"></rect>
              <rect x="14" y="4" width="4" height="16"></rect>
            </svg>
          </button>
        </div>
        <div class="audio-controls" style="margin-top:8px;">
          <label for="model-upload" class="upload-btn" id="model-upload-label">
            <span id="model-upload-text">Thêm 3D (.glb)</span>
          </label>
          <input type="file" id="model-upload" accept=".glb,.gltf" hidden />
          <label class="object-toggle-wrap" title="Bật/Tắt object">
            <input id="object-toggle" type="checkbox" checked />
          </label>
        </div>
        <div class="slider-group" style="margin-top:8px;">
          <label id="label-object-size" for="object-size-slider">Size object</label>
          <input type="range" id="object-size-slider" min="40" max="180" value="100" />
          <span class="slider-value" id="object-size-value">100</span>
        </div>
        <div class="slider-group">
          <label id="label-clone-count" for="clone-count-slider">Số clone</label>
          <input type="range" id="clone-count-slider" min="1" max="10" value="1" />
          <span class="slider-value" id="clone-count-value">1</span>
        </div>
        <div class="slider-group">
          <label id="label-object-rot-x" for="object-rot-x-slider">Góc X</label>
          <input type="range" id="object-rot-x-slider" min="-180" max="180" value="180" />
          <span class="slider-value" id="object-rot-x-value">180</span>
        </div>
        <div class="slider-group">
          <label id="label-object-rot-y" for="object-rot-y-slider">Góc Y</label>
          <input type="range" id="object-rot-y-slider" min="-180" max="180" value="180" />
          <span class="slider-value" id="object-rot-y-value">180</span>
        </div>
        <div class="slider-group">
          <label id="label-object-rot-z" for="object-rot-z-slider">Góc Z</label>
          <input type="range" id="object-rot-z-slider" min="-180" max="180" value="180" />
          <span class="slider-value" id="object-rot-z-value">180</span>
        </div>
        <div class="toggle-row">
          <label id="label-clone-freefly" for="clone-freefly-toggle">Clone bay tự do</label>
          <input id="clone-freefly-toggle" type="checkbox" />
        </div>
        <div id="audio-visualizer" class="audio-visualizer">
          <canvas id="visualizer-canvas" width="280" height="30"></canvas>
        </div>
      </div>

      <div class="ui-section">
        <div id="label-controls" class="section-label">ĐIỀU CHỈNH</div>
        <div class="slider-group">
          <label id="label-speed" for="speed-slider">Tốc độ</label>
          <input type="range" id="speed-slider" min="0" max="100" value="50" />
          <span class="slider-value" id="speed-value">50</span>
        </div>
        <div class="slider-group">
          <label id="label-sensitivity" for="sensitivity-slider">Độ nhạy</label>
          <input type="range" id="sensitivity-slider" min="0" max="100" value="50" />
          <span class="slider-value" id="sensitivity-value">50</span>
        </div>
        <div class="slider-group">
          <label id="label-kaleidoscope" for="kaleidoscope-slider">Kaleidoscope</label>
          <input type="range" id="kaleidoscope-slider" min="0" max="100" value="50" />
          <span class="slider-value" id="kaleidoscope-value">50</span>
        </div>
        <div class="slider-group">
          <label id="label-wave" for="wave-slider">Lượn sóng</label>
          <input type="range" id="wave-slider" min="0" max="100" value="50" />
          <span class="slider-value" id="wave-value">50</span>
        </div>
        <div class="slider-group">
          <label id="label-twist" for="twist-slider">Xoắn</label>
          <input type="range" id="twist-slider" min="0" max="100" value="50" />
          <span class="slider-value" id="twist-value">50</span>
        </div>
        <div id="label-object-sub" class="subsection-label object-only">Object Floating</div>
        <div class="slider-group object-only">
          <label id="label-particle" for="particle-slider">Hạt sáng</label>
          <input type="range" id="particle-slider" min="0" max="100" value="65" />
          <span class="slider-value" id="particle-value">65</span>
        </div>
        <div class="slider-group object-only">
          <label id="label-object-boost" for="object-boost-slider">Object Boost</label>
          <input type="range" id="object-boost-slider" min="0" max="100" value="78" />
          <span class="slider-value" id="object-boost-value">78</span>
        </div>
        <div class="slider-group">
          <label id="label-chaos" for="chaos-slider">Hỗn loạn</label>
          <input type="range" id="chaos-slider" min="0" max="100" value="50" />
          <span class="slider-value" id="chaos-value">50</span>
        </div>
        <div class="inline-select-row object-only">
          <label id="label-particle-shape" for="particle-shape-select">Shape hạt</label>
          <select id="particle-shape-select" class="control-select compact-select">
            <option value="mix" id="shape-mix">Mix</option>
            <option value="sphere" id="shape-sphere">Sphere</option>
            <option value="box" id="shape-box">Box</option>
            <option value="cylinder" id="shape-cylinder">Cylinder</option>
            <option value="torus" id="shape-torus">Torus</option>
          </select>
        </div>
        <div class="inline-select-row object-only">
          <label id="label-object-distance" for="object-distance-select">Khoảng cách</label>
          <select id="object-distance-select" class="control-select compact-select">
            <option value="near" id="distance-near">Near</option>
            <option value="mid" id="distance-mid">Mid</option>
            <option value="far" id="distance-far">Far</option>
          </select>
        </div>
        <div class="toggle-row object-only">
          <label id="label-automix" for="automix-toggle">Random mix</label>
          <input id="automix-toggle" type="checkbox" checked />
        </div>
        <div class="toggle-row object-only">
          <label id="label-object-enabled" for="object-enabled-toggle">Hiện object</label>
          <input id="object-enabled-toggle" type="checkbox" />
        </div>
      </div>

      <div class="ui-section">
        <div id="label-color" class="section-label">MÀU SẮC</div>
        <div id="label-tunnel-color-sub" class="subsection-label">Tunnel Background</div>
        <div class="color-mode-row">
          <label id="label-color-mode" for="color-mode-select">Chế độ màu</label>
          <select id="color-mode-select" class="control-select">
            <option value="theme" id="color-mode-theme">Theo chủ đề</option>
            <option value="custom" id="color-mode-custom">Tùy chỉnh</option>
          </select>
        </div>
        <div class="color-row">
          <label id="label-primary-color" for="primary-color">Màu chính</label>
          <input type="color" id="primary-color" value="#39ff14" />
        </div>
        <div class="color-row">
          <label id="label-secondary-color" for="secondary-color">Màu phụ</label>
          <input type="color" id="secondary-color" value="#ff00ff" />
        </div>
        <div class="color-row">
          <label id="label-bg-color" for="bg-color">Màu nền</label>
          <input type="color" id="bg-color" value="#000510" />
        </div>
        <div id="label-object-color-sub" class="subsection-label object-only">Object Floating</div>
        <div class="color-mode-row object-only">
          <label id="label-object-color-mode" for="object-color-mode-select">Màu object</label>
          <select id="object-color-mode-select" class="control-select">
            <option value="auto" id="object-color-mode-auto">Auto nổi bật</option>
            <option value="custom" id="object-color-mode-custom">Tùy chỉnh</option>
          </select>
        </div>
        <div class="color-row object-only">
          <label id="label-object-color" for="object-color">Màu object</label>
          <input type="color" id="object-color" value="#b7ff2a" />
        </div>
      </div>

      <div class="ui-section">
        <div id="label-theme" class="section-label">CHỦ ĐỀ</div>
        <select id="theme-selector" class="control-select">
          <option value="neonCyberpunk" id="theme-neonCyberpunk">Neon Cyberpunk</option>
          <option value="psychedelicRainbow" id="theme-psychedelicRainbow">Cầu vồng Psychedelic</option>
          <option value="darkIndustrial" id="theme-darkIndustrial">Công nghiệp bóng tối</option>
          <option value="galaxyWarp" id="theme-galaxyWarp">Xuyên ngân hà</option>
        </select>
        <button id="randomize-btn" class="randomize-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="16 3 21 3 21 8"></polyline>
            <line x1="4" y1="20" x2="21" y2="3"></line>
            <polyline points="21 16 21 21 16 21"></polyline>
            <line x1="15" y1="15" x2="21" y2="21"></line>
            <line x1="4" y1="4" x2="9" y2="9"></line>
          </svg>
          <span id="randomize-text">Trộn ngẫu nhiên</span>
        </button>
      </div>

      <div class="ui-section">
        <div id="label-live-set" class="section-label">LIVE SET</div>
        <div class="preset-bank">
          <button id="preset-drop" class="preset-btn preset-btn-active">Drop</button>
          <button id="preset-breakdown" class="preset-btn">Breakdown</button>
          <button id="preset-build-up" class="preset-btn">Build-up</button>
        </div>
      </div>

      <div class="ui-section fps-section">
        <span id="fps-counter" class="fps-counter">60 FPS</span>
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="js/main.js"></script>
</body>
</html>
